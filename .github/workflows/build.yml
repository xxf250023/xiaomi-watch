name: Build Watchface

on:
  push:
    paths:
      - 'watchfaces/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      project:
        description: '要编译的表盘'
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile
        shell: cmd
        run: |
          if not exist output mkdir output

          set "TARGET=${{ github.event.inputs.project }}"
          if not "%TARGET%"=="" (
            for /r "watchfaces\%TARGET%" %%f in (*.fprj) do (
              echo Building: %%f
              compiler\compile.exe -b "%%f" output "%%~nf.face" 1461256429
            )
          ) else (
            for /r watchfaces %%f in (*.fprj) do (
              echo Building: %%f
              compiler\compile.exe -b "%%f" output "%%~nf.face" 1461256429
            )
          )
          dir output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: watchfaces
          path: output/*.face
          if-no-files-found: warn
