name: Build Watchface

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile watchfaces
        shell: cmd
        run: |
          if not exist output mkdir output
          for /r %%f in (*.fprj) do (
            echo Building: %%f
            compiler\compile.exe -b "%%f" output "%%~nf.face" 1461256429
            echo Exit code: %ERRORLEVEL%
            dir output
          )

      - name: Upload watchfaces
        uses: actions/upload-artifact@v4
        with:
          name: watchfaces
          path: output/*.face
          if-no-files-found: warn
